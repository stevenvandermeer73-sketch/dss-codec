name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          target: x86_64-pc-windows-gnu

      - name: Install MinGW
        run: sudo apt-get update && sudo apt-get install -y mingw-w64

      - name: Build Windows EXE
        run: |
          cd dss-codec
          cargo build --release --target x86_64-pc-windows-gnu

      - name: Rename and package EXE
        run: |
          cd dss-codec/target/x86_64-pc-windows-gnu/release
          mv dss-decode.exe ds2-to-wav.exe
          strip ds2-to-wav.exe
          cd ../../../../..
          mkdir -p release
          cp dss-codec/target/x86_64-pc-windows-gnu/release/ds2-to-wav.exe release/
          cp dss-codec/target/x86_64-pc-windows-gnu/release/dss-decode.exe release/  # Original name

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: ds2-to-wav-windows
          path: release/

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
