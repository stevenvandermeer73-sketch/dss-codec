name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: x86_64-pc-windows-gnu

      - name: Install MinGW
        run: sudo apt-get update && sudo apt-get install -y mingw-w64

      - name: Build Windows EXE
        run: |
          cd dss-codec
          cargo build --release --target x86_64-pc-windows-gnu || {
            echo "Build failed, trying with verbose output..."
            cargo build --release --target x86_64-pc-windows-gnu -v
            exit 1
          }

      - name: Package EXE
        run: |
          mkdir -p release
          # Find the exe regardless of exact path
          find target -name "dss-decode.exe" -exec cp {} release/ds2-to-wav.exe \;
          # Also keep original name
          find target -name "dss-decode.exe" -exec cp {} release/ \;

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ds2-to-wav-windows
          path: release/
          compression-level: 9
